server {
    listen 80;
    server_name glpi.aromaris.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name glpi.aromaris.local;
    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;

    location /chat-api/ {
        set $chatbot chatbot-api;
        rewrite ^/chat-api/(.*)$ /$1 break;
        proxy_pass         http://$chatbot:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
        add_header Access-Control-Allow-Origin  *                              always;
        add_header Access-Control-Allow-Headers "Content-Type"                always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS"               always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location /chatbot/ {
        alias   /var/www/html/chatbot/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://glpi:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Accept-Encoding   "";
        sub_filter        '</body>' '<script src="/chatbot/chat-mistral.js"></script></body>';
        sub_filter_once   on;
    }
}


