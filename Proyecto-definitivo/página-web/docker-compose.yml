version: '3.8'

services:
  # 1. Balanceador de Carga
  nginx-balanceador:
    image: nginx:latest
    container_name: nginx-balanceador
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src:/var/www/html # Nginx necesita ver los archivos estáticos (CSS/JS)
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      - backend1
      - backend2
    networks:
      - red-web

  # 2. Certbot para Let's Encrypt
  certbot:
    image: certbot/certbot
    container_name: certbot-ssl
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - red-web

  # 3. Servidor PHP Backend 1
  backend1:
    image: php:8.2-fpm-alpine
    container_name: app-php-1
    volumes:
      - ./src:/var/www/html # Tu código fuente PHP
    # Comando para instalar soporte de PostgreSQL al iniciar (cambiar si usas MySQL)
    command: sh -c "docker-php-ext-install pdo pdo_pgsql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-web

  # 4. Servidor PHP Backend 2
  backend2:
    image: php:8.2-fpm-alpine
    container_name: app-php-2
    volumes:
      - ./src:/var/www/html
    command: sh -c "docker-php-ext-install pdo pdo_pgsql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-web

  # 5. Base de Datos
  base-datos:
    image: postgres:15-alpine
    container_name: db-postgres
    environment:
      POSTGRES_USER: usuario_web
      POSTGRES_PASSWORD: password_seguro_123
      POSTGRES_DB: mi_app_db
    volumes:
      - datos-sql:/var/lib/postgresql/data
    networks:
      - red-web

volumes:
  certbot-etc:
  certbot-var:
  datos-sql:

networks:
  red-web:
    driver: bridge
