version: '3.8'

services:
  nginx-balanceador:
    image: nginx:latest
    container_name: nginx-balanceador
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src:/var/www/html
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      - backend1
      - backend2
    networks:
      - red-publica

  certbot:
    image: certbot/certbot
    container_name: certbot-ssl
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - red-publica

  backend1:
    image: php:8.2-fpm-alpine
    container_name: app-php-1
    volumes:
      - ./src:/var/www/html
    command: sh -c "docker-php-ext-install pdo pdo_mysql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-publica
      - red-privada

  backend2:
    image: php:8.2-fpm-alpine
    container_name: app-php-2
    volumes:
      - ./src:/var/www/html
    command: sh -c "docker-php-ext-install pdo pdo_mysql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-publica
      - red-privada

  base-datos:
    image: mysql:8.0
    container_name: db-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password_super_seguro
      MYSQL_DATABASE: mi_app_db
      MYSQL_USER: usuario_web
      MYSQL_PASSWORD: password_seguro_123
    volumes:
      - datos-mysql:/var/lib/mysql
    networks:
      - red-privada

volumes:
  certbot-etc:
  certbot-var:
  datos-mysql:

networks:
  red-publica:
    driver: bridge
  red-privada:
    driver: bridge