version: '3.8'
services:
  nginx-balanceador:
    image: nginx:latest
    container_name: nginx-balanceador
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
      - ./html:/var/www/html
    depends_on:
      - backend1
      - backend2
    networks:
      - red-publica
      - red-privada
  backend1:
    image: php:8.2-fpm-alpine
    container_name: app-php-1
    restart: always
    volumes:
      - ./html:/var/www/html
      - ./php/docker.conf:/usr/local/etc/php-fpm.d/docker.conf
    command: sh -c "docker-php-ext-install pdo pdo_mysql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-privada
  backend2:
    image: php:8.2-fpm-alpine
    container_name: app-php-2
    restart: always
    volumes:
      - ./html:/var/www/html
      - ./php/docker.conf:/usr/local/etc/php-fpm.d/docker.conf
    command: sh -c "docker-php-ext-install pdo pdo_mysql && php-fpm"
    depends_on:
      - base-datos
    networks:
      - red-privada
  base-datos:
    image: mysql:8.0
    container_name: db-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_super_seguro
      MYSQL_DATABASE: mi_app_db
      MYSQL_USER: usuario_web
      MYSQL_PASSWORD: password_seguro_123
    volumes:
      - ./datos-mysql:/var/lib/mysql
      - ./
    networks:
      - red-privada
networks:
  red-publica:
    driver: bridge
  red-privada:
    driver: bridge
