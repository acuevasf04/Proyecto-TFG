events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream php_backends {
        server backend1:9000;
        server backend2:9000;
    }

    server {
        listen 80;
        server_name aromaris.org www.aromaris.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    # Bloque HTTPS Activo
    server {
        listen 443 ssl;
        server_name aromaris.org www.aromaris.org;

        ssl_certificate /etc/letsencrypt/live/aromaris.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aromaris.org/privkey.pem;

        root /var/www/html;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass php_backends;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }
}